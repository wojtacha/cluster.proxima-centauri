## This chart relies on the common library chart from bjw-s
## You can find it at https://github.com/bjw-s-labs/helm-charts/tree/common-5.0.1/charts/library/common
## Refer there for more detail about the supported values
##
## Upgraded to chart 0.12.0 / Immich v2.7.5 with VectorChord + Valkey.

# These entries are shared between all the Immich components
immich-chart:
  controllers:
    main:
      containers:
        main:
          image:
            tag: v2.7.5
          env:
            REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
            DB_HOSTNAME: "postgres-clusterip.default.svc.cluster.local"
            DB_USERNAME: "admin"
            DB_DATABASE_NAME: "immich"
            DB_PASSWORD: "password"
            IMMICH_MACHINE_LEARNING_URL: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'

  immich:
    metrics:
      enabled: false
    persistence:
      # Main data store for all photos shared between different components.
      library:
        # Automatically creating the library volume is not supported by this chart
        # You have to specify an existing PVC to use
        existingClaim: pvc-immich
    # configuration is immich-config.json converted to yaml
    # ref: https://immich.app/docs/install/config-file/
    configuration: {}
      # trash:
      #   enabled: false
      #   days: 30
      # storageTemplate:
      #   enabled: true
      #   template: "{{y}}/{{y}}-{{MM}}-{{dd}}/{{filename}}"
    configurationKind: ConfigMap

  # Dependencies

  # Valkey replaces the deprecated Redis subchart in chart >= 0.10.0
  valkey:
    enabled: true
    persistence:
      data:
        enabled: true
        size: 1Gi
        type: emptyDir
        accessMode: ReadWriteOnce

  # Immich components
  server:
    enabled: true
    controllers:
      main:
        replicas: 3
        strategy: RollingUpdate
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              pullPolicy: IfNotPresent
    ingress:
      main:
        enabled: false
        annotations:
          # proxy-body-size is set to 0 to remove the body limit on file uploads
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
        hosts:
          - host: immich.local
            paths:
              - path: "/"
                service:
                  identifier: main
        tls: []

  machine-learning:
    enabled: true
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              pullPolicy: IfNotPresent
            env:
              TRANSFORMERS_CACHE: /cache
              HF_XET_CACHE: /cache/huggingface-xet
              MPLCONFIGDIR: /cache/matplotlib-config
    persistence:
      cache:
        enabled: true
        size: 10Gi
        type: emptyDir
        accessMode: ReadWriteMany
