apiVersion: v1
kind: Service
metadata:
  name: dashboard-lb-svc
  namespace: kubernetes-dashboard
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.88.210
  selector:
    app.kubernetes.io/component: app
    app.kubernetes.io/instance: kubernetes-dashboard
    app.kubernetes.io/name: kong
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
